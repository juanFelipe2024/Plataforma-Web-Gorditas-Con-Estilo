<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Gorditas con Estilo</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="page-auth">
    <div class="auth-container">
        <div class="auth-card">
            <h1 class="auth-title">Gorditas con Estilo</h1>
            <h2 class="auth-subtitle">Iniciar Sesión</h2>

            <div id="error-message" class="error-message hidden"></div>

            <div class="form-group">
                <label for="email">Correo electrónico</label>
                <input type="email" id="email" placeholder="tucorreo@ejemplo.com">
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" placeholder="Tu contraseña">
            </div>

            <button id="btn-login" class="btn-primary">Iniciar Sesión</button>

            <p class="auth-link">¿No tienes cuenta? <a href="register.html">Regístrate aquí</a></p>
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
