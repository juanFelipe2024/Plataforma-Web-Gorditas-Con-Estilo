<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Gorditas con Estilo</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="page-auth">
    <div class="auth-container">
        <div class="auth-card">
            <h1 class="auth-title">Gorditas con Estilo</h1>
            <h2 class="auth-subtitle">Crear cuenta</h2>

            <div id="error-message" class="error-message hidden"></div>
            <div id="success-message" class="success-message hidden"></div>

            <div class="form-group">
                <label for="nombre">Nombre completo</label>
                <input type="text" id="nombre" placeholder="Tu nombre completo">
            </div>

            <div class="form-group">
                <label for="email">Correo electrónico</label>
                <input type="email" id="email" placeholder="tucorreo@ejemplo.com">
            </div>

            <div class="form-group">
                <label for="telefono">Teléfono</label>
                <input type="text" id="telefono" placeholder="Tu número de teléfono">
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" placeholder="Mínimo 6 caracteres">
            </div>

            <button id="btn-register" class="btn-primary">Crear cuenta</button>

            <p class="auth-link">¿Ya tienes cuenta? <a href="login.html">Inicia sesión aquí</a></p>
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
